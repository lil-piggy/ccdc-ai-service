# Render 免费版不支持 Persistent Disk，因此使用 PostgreSQL 作为持久化数据库。
# 请在 Render Dashboard 中手动创建一个 Free PostgreSQL 实例，
# 然后将 Internal Database URL 填入环境变量 DATABASE_URL。
services:
  - type: web
    name: ccdc-ai-service
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_API_MODELS
        sync: false
