services:
  - type: web
    name: ccdc-ai-service
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
