services:
  - type: web
    name: ccdc-ai-service
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: ccdc-data
      mountPath: /var/lib/ccdc
      sizeGB: 0.5
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/lib/ccdc/data.sqlite
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_API_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_API_MODELS
        sync: false
